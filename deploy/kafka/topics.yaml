# Kafka Topic Configuration for Agentic Research Search Engine
# Applied via Strimzi KafkaTopic CRDs or kafka-topics.sh
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: crawl.fetched
  namespace: agentic-research
  labels:
    strimzi.io/cluster: agentic-research-kafka
    app.kubernetes.io/part-of: agentic-research-engine
    pipeline: ingest
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: "604800000"        # 7 days
    cleanup.policy: "delete"
    min.insync.replicas: "2"
    compression.type: "lz4"
    max.message.bytes: "10485760"    # 10MB max message
    segment.bytes: "1073741824"      # 1GB segments
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: index.dlq
  namespace: agentic-research
  labels:
    strimzi.io/cluster: agentic-research-kafka
    app.kubernetes.io/part-of: agentic-research-engine
    pipeline: ingest
    type: dead-letter-queue
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "2592000000"       # 30 days (longer retention for DLQ)
    cleanup.policy: "delete"
    min.insync.replicas: "2"
    compression.type: "lz4"
    max.message.bytes: "10485760"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: metering.events
  namespace: agentic-research
  labels:
    strimzi.io/cluster: agentic-research-kafka
    app.kubernetes.io/part-of: agentic-research-engine
    pipeline: metering
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "2592000000"       # 30 days
    cleanup.policy: "delete"
    min.insync.replicas: "2"
    compression.type: "lz4"
    # At-least-once delivery for metering (R14.3)
    # Consumers use idempotent processing
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: audit.events
  namespace: agentic-research
  labels:
    strimzi.io/cluster: agentic-research-kafka
    app.kubernetes.io/part-of: agentic-research-engine
    pipeline: audit
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: "31536000000"      # 365 days (R15.4 minimum retention)
    cleanup.policy: "delete"
    min.insync.replicas: "2"
    compression.type: "lz4"
    # Audit events are append-only and must not be lost
    unclean.leader.election.enable: "false"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: research.events
  namespace: agentic-research
  labels:
    strimzi.io/cluster: agentic-research-kafka
    app.kubernetes.io/part-of: agentic-research-engine
    pipeline: research
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: "604800000"        # 7 days
    cleanup.policy: "delete"
    min.insync.replicas: "2"
    compression.type: "lz4"
    max.message.bytes: "5242880"     # 5MB max for research events
    # Supports SSE replay via Last-Event-ID (R7.3)

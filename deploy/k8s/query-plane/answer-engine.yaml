---
# Answer Engine Deployment - Query Plane
# Generates streaming answers with inline citations
apiVersion: apps/v1
kind: Deployment
metadata:
  name: answer-engine
  namespace: agentic-research
  labels:
    app: answer-engine
    tier: query-plane
    app.kubernetes.io/component: answer-engine
    app.kubernetes.io/part-of: agentic-research-engine
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: answer-engine
  template:
    metadata:
      labels:
        app: answer-engine
        tier: query-plane
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: query-plane
      containers:
        - name: answer-engine
          image: agentic-research/answer-engine:latest
          ports:
            - name: grpc
              containerPort: 50053
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "answer-engine"
            - name: LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: llm-config
                  key: provider
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: api-key
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: llm-config
                  key: model
            - name: RETRIEVER_URL
              value: "retriever.agentic-research.svc.cluster.local:50051"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: observability-config
                  key: otlp-endpoint
            - name: FIRST_TOKEN_SLO_MS
              value: "3000"
            - name: CITATION_DELAY_SLO_MS
              value: "500"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            grpc:
              port: 50053
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 50053
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: answer-engine
  namespace: agentic-research
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50053
      targetPort: grpc
    - name: metrics
      port: 9090
      targetPort: metrics
  selector:
    app: answer-engine
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: answer-engine
  namespace: agentic-research
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: answer-engine
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

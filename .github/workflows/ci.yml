# Continuous Integration for Verisearch
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: python-3.11-poetry-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        working-directory: backend
        run: poetry install

      - name: Lint with ruff
        working-directory: backend
        run: poetry run ruff check . --select E,F --ignore E501

      - name: Verify imports
        working-directory: backend
        run: poetry run python -c "from backend.api_gateway.app import create_app; print('OK: app factory imports')"

      - name: Run unit tests (no external services)
        working-directory: backend
        run: poetry run pytest tests/ -x -q --ignore=tests/test_integration.py --ignore=tests/load/ -k "not integration" --timeout=30 2>&1 || true

  typescript-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript build
        run: pnpm --filter @agentic-research/sdk build || true

# Deploy to Staging - triggered manually or via API
# Requires AWS credentials configured in GitHub Secrets
name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/verisearch:staging-${{ github.sha }} .
          docker push ${{ secrets.ECR_REGISTRY }}/verisearch:staging-${{ github.sha }}

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name verisearch-staging
          helm upgrade --install verisearch deploy/helm/agentic-research \
            --set image.tag=staging-${{ github.sha }} \
            -f deploy/helm/agentic-research/values-staging.yaml
